<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sach.in — Your Link Universe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #222233;
    --accent: #f5a623;
    --accent2: #ff6b6b;
    --accent3: #4ecdc4;
    --text: #f0f0f8;
    --muted: #6b6b88;
    --card-bg: #13131e;
    --radius: 18px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
    padding-bottom: 100px;
    overflow-x: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    top: -200px;
    left: -100px;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(245,166,35,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -100px;
    right: -100px;
    width: 350px;
    height: 350px;
    background: radial-gradient(circle, rgba(78,205,196,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 12px;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-icon {
    width: 34px;
    height: 34px;
    background: linear-gradient(135deg, var(--accent), #ff8c42);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    box-shadow: 0 0 20px rgba(245,166,35,0.3);
  }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo-dot {
    font-family: 'Syne', sans-serif;
    font-weight: 400;
    font-size: 13px;
    color: var(--muted);
    -webkit-text-fill-color: var(--muted);
  }
  .header-stats {
    font-size: 12px;
    color: var(--muted);
    background: var(--surface2);
    padding: 5px 11px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }
  .header-stats span {
    color: var(--accent);
    font-weight: 600;
  }

  /* Search */
  .search-wrap {
    position: relative;
  }
  .search-icon {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 15px;
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px 10px 38px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: rgba(245,166,35,0.4); }
  .search-input::placeholder { color: var(--muted); }
  .clear-search {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--surface);
    border: none;
    color: var(--muted);
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 11px;
  }
  .search-input:not(:placeholder-shown) + .clear-search { display: flex; }

  /* Main content */
  main { padding: 0 16px; position: relative; z-index: 1; }

  /* Add URL Bar */
  .add-section {
    padding: 16px 0 4px;
  }
  .add-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-weight: 500;
    margin-bottom: 10px;
    font-family: 'Syne', sans-serif;
  }
  .url-input-wrap {
    position: relative;
    display: flex;
    gap: 10px;
  }
  .url-input {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 13px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .url-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(245,166,35,0.1);
  }
  .url-input::placeholder { color: var(--muted); }
  .add-btn {
    background: linear-gradient(135deg, var(--accent), #ff8c42);
    border: none;
    border-radius: var(--radius-sm);
    padding: 13px 18px;
    color: #0a0a0f;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: transform 0.15s, opacity 0.15s;
    box-shadow: 0 4px 20px rgba(245,166,35,0.25);
  }
  .add-btn:active { transform: scale(0.96); opacity: 0.9; }
  .add-btn:disabled { opacity: 0.5; pointer-events: none; }

  /* Loading card */
  .loading-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin: 14px 0 0;
    display: none;
    align-items: center;
    gap: 14px;
  }
  .loading-card.show { display: flex; }
  .loader-spinner {
    width: 28px;
    height: 28px;
    border: 2.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--muted); }
  .loading-text strong { color: var(--text); display: block; font-size: 13px; margin-top: 2px; }

  /* Section header */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 0 12px;
  }
  .section-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--text);
  }
  .sort-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 12px;
    color: var(--muted);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
  }

  /* Link Cards */
  .links-list { display: flex; flex-direction: column; gap: 12px; }

  .link-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
    transition: transform 0.2s, box-shadow 0.2s;
    animation: cardIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .link-card:active { transform: scale(0.98); }

  .card-thumb {
    width: 100%;
    height: 170px;
    object-fit: cover;
    display: block;
    background: var(--surface2);
  }
  .card-thumb-placeholder {
    width: 100%;
    height: 170px;
    background: linear-gradient(135deg, var(--surface2), var(--border));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    flex-shrink: 0;
  }

  .card-body { padding: 14px 14px 12px; }
  .card-site {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 8px;
  }
  .card-favicon {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    object-fit: contain;
    flex-shrink: 0;
  }
  .card-favicon-fallback {
    width: 16px;
    height: 16px;
    background: var(--accent);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: #000;
    font-weight: 700;
    flex-shrink: 0;
  }
  .card-domain {
    font-size: 11px;
    color: var(--accent);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-date {
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 15px;
    line-height: 1.35;
    margin-bottom: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .card-actions {
    display: flex;
    gap: 8px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
    margin-top: 2px;
  }
  .card-action {
    flex: 1;
    background: var(--surface2);
    border: none;
    border-radius: 8px;
    padding: 9px;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    transition: background 0.15s, color 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .card-action:active { background: var(--border); }
  .card-action.open { color: var(--accent); }
  .card-action.copy { color: var(--accent3); }
  .card-action.delete { color: var(--accent2); }

  /* Tag pill */
  .card-tag {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--text);
    font-weight: 500;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);
    z-index: 999;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    white-space: nowrap;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: rgba(78,205,196,0.4); color: var(--accent3); }
  .toast.error { border-color: rgba(255,107,107,0.4); color: var(--accent2); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    display: none;
  }
  .empty-state.show { display: block; }
  .empty-icon { font-size: 52px; margin-bottom: 16px; }
  .empty-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
    margin-bottom: 8px;
  }
  .empty-sub { font-size: 14px; color: var(--muted); line-height: 1.6; }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    max-width: 430px;
    margin: 0 auto;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 10px 20px 24px;
    gap: 4px;
    z-index: 100;
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px 4px;
    border-radius: 12px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    cursor: pointer;
    transition: color 0.2s, background 0.2s;
  }
  .nav-item.active {
    color: var(--accent);
    background: rgba(245,166,35,0.08);
  }
  .nav-icon { font-size: 20px; line-height: 1; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Filter tabs */
  .filter-tabs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    padding: 0 0 4px;
  }
  .filter-tabs::-webkit-scrollbar { display: none; }
  .filter-tab {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    color: var(--muted);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .filter-tab.active {
    background: rgba(245,166,35,0.15);
    border-color: rgba(245,166,35,0.4);
    color: var(--accent);
  }

  /* No-thumb card layout */
  .link-card.no-thumb { }
  .link-card.no-thumb .card-body { padding: 14px; }

  /* Swipe delete visual hint */
  .link-card::before {
    content: '🗑 Delete';
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent2);
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">🔗</div>
      <div>
        <span class="logo-text">Sach.in</span>
        <span class="logo-dot"> links</span>
      </div>
    </div>
    <div class="header-stats"><span id="link-count">0</span> saved</div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search-input" type="search" placeholder="Search your links…" autocomplete="off">
    <button class="clear-search" onclick="clearSearch()">✕</button>
  </div>
</header>

<!-- Main -->
<main>
  <!-- Add URL -->
  <div class="add-section">
    <div class="add-label">Save a Link</div>
    <div class="url-input-wrap">
      <input class="url-input" id="url-input" type="url" placeholder="Paste any URL here…" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
      <button class="add-btn" id="add-btn" onclick="addLink()">Save</button>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading-card" id="loading-card">
    <div class="loader-spinner"></div>
    <div class="loading-text">
      Fetching details…
      <strong id="loading-url"></strong>
    </div>
  </div>

  <!-- Filter tabs -->
  <div class="section-header">
    <div class="section-title" id="section-label">All Links</div>
  </div>
  <div class="filter-tabs" id="filter-tabs">
    <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
    <button class="filter-tab" onclick="setFilter('recent', this)">Recent</button>
    <button class="filter-tab" onclick="setFilter('articles', this)">Articles</button>
    <button class="filter-tab" onclick="setFilter('videos', this)">Videos</button>
    <button class="filter-tab" onclick="setFilter('social', this)">Social</button>
  </div>

  <!-- Links list -->
  <div style="height:12px"></div>
  <div class="links-list" id="links-list"></div>

  <!-- Empty state -->
  <div class="empty-state" id="empty-state">
    <div class="empty-icon">🌐</div>
    <div class="empty-title">No links yet</div>
    <div class="empty-sub">Paste any URL above to<br>save it with a rich preview</div>
  </div>
</main>

<!-- Bottom nav -->
<nav class="bottom-nav">
  <button class="nav-item active" onclick="setView('links', this)">
    <span class="nav-icon">🔗</span>Links
  </button>
  <button class="nav-item" onclick="setView('favorites', this)">
    <span class="nav-icon">⭐</span>Stars
  </button>
  <button class="nav-item" onclick="setView('recent', this)">
    <span class="nav-icon">🕐</span>Recent
  </button>
  <button class="nav-item" onclick="setView('settings', this)">
    <span class="nav-icon">⚙️</span>More
  </button>
</nav>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── State ───────────────────────────────────────────
let links = JSON.parse(localStorage.getItem('sachin_links') || '[]');
let currentFilter = 'all';
let searchQuery = '';
let currentView = 'links';

// ─── Save / Load ──────────────────────────────────────
function save() {
  localStorage.setItem('sachin_links', JSON.stringify(links));
  updateCount();
}
function updateCount() {
  document.getElementById('link-count').textContent = links.length;
}

// ─── Fetch metadata ──────────────────────────────────
async function fetchMeta(url) {
  // Try microlink.io for rich metadata
  const apiUrl = `https://api.microlink.io?url=${encodeURIComponent(url)}&screenshot=false`;
  const res = await fetch(apiUrl);
  if (!res.ok) throw new Error('API error');
  const data = await res.json();
  if (data.status !== 'success') throw new Error('No data');
  const d = data.data;
  return {
    title: d.title || extractDomain(url),
    description: d.description || '',
    image: d.image?.url || d.logo?.url || null,
    favicon: d.logo?.url || `https://www.google.com/s2/favicons?domain=${extractDomain(url)}&sz=32`,
    domain: extractDomain(url),
    type: detectType(url, d),
  };
}

function extractDomain(url) {
  try {
    return new URL(url).hostname.replace('www.', '');
  } catch { return url; }
}

function detectType(url, data) {
  const domain = extractDomain(url).toLowerCase();
  if (domain.includes('youtube') || domain.includes('vimeo') || domain.includes('twitch')) return 'video';
  if (domain.includes('twitter') || domain.includes('instagram') || domain.includes('facebook') ||
      domain.includes('linkedin') || domain.includes('reddit')) return 'social';
  if (data?.type === 'article' || data?.publisher) return 'article';
  return 'web';
}

// ─── Add link ─────────────────────────────────────────
async function addLink() {
  const input = document.getElementById('url-input');
  let url = input.value.trim();
  if (!url) return;

  // Auto-add https
  if (!url.startsWith('http')) url = 'https://' + url;

  // Basic validation
  try { new URL(url); } catch {
    showToast('Invalid URL', 'error');
    return;
  }

  // Check duplicate
  if (links.find(l => l.url === url)) {
    showToast('Already saved!', 'error');
    return;
  }

  // Show loading
  const loadingCard = document.getElementById('loading-card');
  document.getElementById('loading-url').textContent = extractDomain(url);
  loadingCard.classList.add('show');
  document.getElementById('add-btn').disabled = true;
  input.value = '';

  try {
    const meta = await fetchMeta(url);
    const link = {
      id: Date.now(),
      url,
      title: meta.title,
      description: meta.description,
      image: meta.image,
      favicon: meta.favicon,
      domain: meta.domain,
      type: meta.type,
      saved: new Date().toISOString(),
      starred: false,
    };
    links.unshift(link);
    save();
    render();
    showToast('✓ Link saved!', 'success');
  } catch (e) {
    // Fallback: save with minimal info
    const domain = extractDomain(url);
    const link = {
      id: Date.now(),
      url,
      title: domain,
      description: '',
      image: null,
      favicon: `https://www.google.com/s2/favicons?domain=${domain}&sz=32`,
      domain,
      type: 'web',
      saved: new Date().toISOString(),
      starred: false,
    };
    links.unshift(link);
    save();
    render();
    showToast('Saved (no preview)', 'success');
  } finally {
    loadingCard.classList.remove('show');
    document.getElementById('add-btn').disabled = false;
  }
}

// ─── Paste auto-trigger ───────────────────────────────
document.getElementById('url-input').addEventListener('paste', () => {
  setTimeout(addLink, 50);
});
document.getElementById('url-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addLink();
});

// ─── Render ───────────────────────────────────────────
function getFiltered() {
  let list = [...links];

  // View filter
  if (currentView === 'favorites') list = list.filter(l => l.starred);
  else if (currentView === 'recent') list = list.slice(0, 10);

  // Tab filter
  if (currentFilter === 'recent') list = list.slice(0, 8);
  else if (currentFilter === 'articles') list = list.filter(l => l.type === 'article');
  else if (currentFilter === 'videos') list = list.filter(l => l.type === 'video');
  else if (currentFilter === 'social') list = list.filter(l => l.type === 'social');

  // Search
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(l =>
      l.title.toLowerCase().includes(q) ||
      l.domain.toLowerCase().includes(q) ||
      (l.description || '').toLowerCase().includes(q)
    );
  }
  return list;
}

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 7) return `${days}d ago`;
  return new Date(iso).toLocaleDateString('en', { month: 'short', day: 'numeric' });
}

function typeEmoji(type) {
  return { video: '▶', social: '💬', article: '📝', web: '🌐' }[type] || '🌐';
}

function render() {
  const list = getFiltered();
  const container = document.getElementById('links-list');
  const empty = document.getElementById('empty-state');

  if (!list.length) {
    container.innerHTML = '';
    empty.classList.add('show');
    empty.querySelector('.empty-title').textContent = searchQuery ? 'No results found' : 'No links yet';
    empty.querySelector('.empty-sub').innerHTML = searchQuery
      ? 'Try a different search term'
      : 'Paste any URL above to<br>save it with a rich preview';
    return;
  }
  empty.classList.remove('show');

  container.innerHTML = list.map(link => `
    <div class="link-card ${!link.image ? 'no-thumb' : ''}" id="card-${link.id}">
      ${link.image ? `
        <img class="card-thumb" src="${escHtml(link.image)}" alt="" 
          onerror="this.parentElement.querySelector('.card-thumb-placeholder') && (this.style.display='none'); this.remove(); showPlaceholder(${link.id})"
          loading="lazy">
      ` : `
        <div class="card-thumb-placeholder">${typeEmoji(link.type)}</div>
      `}
      <div class="card-tag">${typeEmoji(link.type)} ${link.type}</div>
      <div class="card-body">
        <div class="card-site">
          <img class="card-favicon" src="${escHtml(link.favicon)}" alt=""
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="card-favicon-fallback" style="display:none">${link.domain[0].toUpperCase()}</div>
          <div class="card-domain">${escHtml(link.domain)}</div>
          <div class="card-date">${timeAgo(link.saved)}</div>
        </div>
        <div class="card-title">${escHtml(link.title)}</div>
        ${link.description ? `<div class="card-desc">${escHtml(link.description)}</div>` : ''}
        <div class="card-actions">
          <button class="card-action open" onclick="openLink('${link.id}')">↗ Open</button>
          <button class="card-action copy" onclick="copyLink('${link.id}')">⧉ Copy</button>
          <button class="card-action" onclick="toggleStar('${link.id}')" id="star-${link.id}">${link.starred ? '⭐ Starred' : '☆ Star'}</button>
          <button class="card-action delete" onclick="deleteLink('${link.id}')">✕</button>
        </div>
      </div>
    </div>
  `).join('');
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showPlaceholder(id) {
  const card = document.getElementById(`card-${id}`);
  if (card) {
    const ph = document.createElement('div');
    ph.className = 'card-thumb-placeholder';
    const link = links.find(l => l.id == id);
    ph.textContent = link ? typeEmoji(link.type) : '🌐';
    card.insertBefore(ph, card.querySelector('.card-body'));
  }
}

// ─── Actions ─────────────────────────────────────────
function openLink(id) {
  const link = links.find(l => l.id == id);
  if (link) window.open(link.url, '_blank');
}
function copyLink(id) {
  const link = links.find(l => l.id == id);
  if (link) {
    navigator.clipboard.writeText(link.url).then(() => showToast('✓ Copied!', 'success'));
  }
}
function deleteLink(id) {
  links = links.filter(l => l.id != id);
  save();
  const card = document.getElementById(`card-${id}`);
  if (card) {
    card.style.transition = 'opacity 0.2s, transform 0.2s';
    card.style.opacity = '0';
    card.style.transform = 'scale(0.95)';
    setTimeout(() => render(), 220);
  }
  showToast('Deleted', '');
}
function toggleStar(id) {
  const link = links.find(l => l.id == id);
  if (link) {
    link.starred = !link.starred;
    save();
    render();
    showToast(link.starred ? '⭐ Starred!' : 'Unstarred', link.starred ? 'success' : '');
  }
}

// ─── Filters ──────────────────────────────────────────
function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function setView(view, btn) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  btn.classList.add('active');
  const label = { links: 'All Links', favorites: 'Starred', recent: 'Recent', settings: 'Settings' }[view];
  document.getElementById('section-label').textContent = label;
  render();
}
function clearSearch() {
  document.getElementById('search-input').value = '';
  searchQuery = '';
  render();
}

document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

// ─── Toast ────────────────────────────────────────────
let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show${type ? ' ' + type : ''}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── Init ─────────────────────────────────────────────
updateCount();
render();

// Seed with a demo link if empty
if (links.length === 0) {
  const demo = {
    id: Date.now(),
    url: 'https://www.anthropic.com',
    title: 'Anthropic — AI Safety Company',
    description: 'Anthropic is an AI safety company working to build reliable, interpretable, and steerable AI systems.',
    image: 'https://www.anthropic.com/images/index/og.jpg',
    favicon: 'https://www.google.com/s2/favicons?domain=anthropic.com&sz=32',
    domain: 'anthropic.com',
    type: 'web',
    saved: new Date().toISOString(),
    starred: false,
  };
  links.push(demo);
  save();
  render();
}
</script>
</body>
</html>
