<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sach.in – Premium Link Manager</title>
    <meta name="description" content="Manage your links with a premium, glassmorphism-inspired dashboard. Simple, elegant, and powerful.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dark-theme">
    <div id="app">
        <header>
            <div class="header-content container">
                <h1 class="logo">Sach<span>.in</span></h1>
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="Search title, URL, or domain..." autocomplete="off">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
            </div>
        </header>

        <main class="container">
            <div id="linksGrid" class="links-grid">
                <!-- Links will be rendered here -->
            </div>
        </main>

        <button id="fab" class="fab" aria-label="Add new link">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>

        <div id="overlay" class="overlay"></div>

        <div id="bottomSheet" class="bottom-sheet">
            <div class="sheet-handle"></div>
            <div class="sheet-content">
                <h2>Add New Link</h2>
                <div class="input-group">
                    <input type="url" id="linkInput" placeholder="https://example.com" autocomplete="off">
                </div>
                
                <div id="previewContainer" class="preview-container hidden">
                    <div class="preview-card">
                        <div class="preview-thumb">
                            <img id="previewImg" src="" alt="Preview">
                        </div>
                        <div class="preview-info">
                            <h3 id="previewTitle">Link Title</h3>
                            <p id="previewDesc">Description will appear here...</p>
                        </div>
                    </div>
                </div>

                <div class="sheet-actions">
                    <button id="cancelBtn" class="btn secondary">Cancel</button>
                    <button id="saveBtn" class="btn primary">Save Link</button>
                    <div id="loadingSpinner" class="spinner hidden"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
