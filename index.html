<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sach.in | Advanced URL Manager</title>
    <meta name="description" content="A powerful, detailed, and visually stunning hub to manage, organize, and analyze all your links.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Background Elements -->
    <div class="mesh-bg"></div>
    <div class="gradient-sphere sphere-1"></div>
    <div class="gradient-sphere sphere-2"></div>
    <div class="gradient-sphere sphere-3"></div>

    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar glass-panel">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon"><i class="fa-brands fa-instagram"></i></div>
                    <a href="https://www.instagram.com/sachinpatil12n/" target="_blank" rel="noopener noreferrer"><h2>Sach.<span>in</span></h2></a>
                </div>
            </div>

            <div class="sidebar-scroll">
                <div class="nav-section">
                    <h3>Dashboard</h3>
                    <ul class="nav-list">
                        <li>
                            <button class="nav-item active" data-filter="all">
                                <i class="fa-solid fa-layer-group"></i> All Links
                                <span class="count" id="count-all">0</span>
                            </button>
                        </li>
                        <li>
                            <button class="nav-item" data-filter="favorites">
                                <i class="fa-solid fa-star text-warning"></i> Favorites
                                <span class="count" id="count-favorites">0</span>
                            </button>
                        </li>
                        <li>
                            <button class="nav-item" data-filter="unread">
                                <i class="fa-solid fa-inbox text-accent"></i> Read Later
                                <span class="count" id="count-unread">0</span>
                            </button>
                        </li>
                    </ul>
                </div>

                <div class="nav-section">
                    <div class="section-trigger">
                        <h3>Collections</h3>
                    </div>
                    <ul class="nav-list" id="collection-list">
                        <!-- Collections injected by JS -->
                    </ul>
                </div>
            </div>

            <div class="sidebar-footer">
                <button class="nav-item" id="export-btn" title="Export Links as JSON">
                    <i class="fa-solid fa-download"></i> Export Data
                </button>
                <button class="nav-item" id="import-btn" title="Import Links from JSON">
                    <i class="fa-solid fa-upload"></i> Import Data
                </button>
                <input type="file" id="import-file" accept=".json" style="display: none;">
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Top App Bar -->
            <header class="top-bar glass-panel">
                <button class="icon-btn mobile-menu-btn hidden-desktop" id="mobile-menu-btn" title="Menu">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="search-container">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="global-search" placeholder="Search by title, url, tags, or notes... (Press Cmd/Ctrl + K)" autocomplete="off">
                    <button id="clear-search" class="hidden"><i class="fa-solid fa-xmark"></i></button>
                </div>
                
                <div class="top-bar-actions">
                    <div class="view-toggles">
                        <button class="icon-btn active" id="view-grid" title="Grid View">
                            <i class="fa-solid fa-border-all"></i>
                        </button>
                        <button class="icon-btn" id="view-list" title="List View">
                            <i class="fa-solid fa-list-ul"></i>
                        </button>
                    </div>
                    
                    <div class="separator"></div>

                    <div class="dropdown-wrapper">
                        <button class="btn secondary-btn" id="theme-dropdown-btn" title="Change Theme">
                            <i class="fa-solid fa-palette"></i> Theme
                        </button>
                        <ul class="dropdown-menu hidden" id="theme-menu">
                            <li class="dropdown-item active" data-theme="indigo"><i class="fa-solid fa-circle" style="color: #6366f1;"></i> Indigo Pro</li>
                            <li class="dropdown-item" data-theme="emerald"><i class="fa-solid fa-circle" style="color: #10b981;"></i> Emerald Flow</li>
                            <li class="dropdown-item" data-theme="rose"><i class="fa-solid fa-circle" style="color: #f43f5e;"></i> Rose Neon</li>
                        </ul>
                    </div>

                    <div class="separator"></div>

                    <div class="dropdown-wrapper">
                        <button class="btn secondary-btn" id="sort-dropdown-btn">
                            <i class="fa-solid fa-arrow-down-a-z"></i> Sort By <i class="fa-solid fa-chevron-down ms-1"></i>
                        </button>
                        <ul class="dropdown-menu hidden" id="sort-menu">
                            <li class="dropdown-item active" data-sort="newest">Newest First</li>
                            <li class="dropdown-item" data-sort="oldest">Oldest First</li>
                            <li class="dropdown-item" data-sort="visits">Most Visited</li>
                            <li class="dropdown-item" data-sort="a-z">Title (A-Z)</li>
                            <li class="dropdown-item" data-sort="z-a">Title (Z-A)</li>
                        </ul>
                    </div>
                    
                    <button class="btn primary-btn pulse-glow" id="open-add-modal">
                        <i class="fa-solid fa-plus"></i> New Link
                    </button>
                </div>
            </header>

            <!-- Content Area Header -->
            <div class="content-header" style="flex-direction: column; align-items: stretch; gap: 1.5rem;">
                <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                    <div>
                        <h1 id="current-view-title">All Links</h1>
                        <p id="current-view-subtitle">Manage and organize your saved URLs</p>
                    </div>
                    <div class="stats-pills" id="quick-stats">
                        <!-- Quick stats injected by JS -->
                    </div>
                </div>
                
                <form id="quick-add-form" class="quick-add-box glass-panel" style="display: flex; gap: 1rem; align-items: center; padding: 0.75rem 1.25rem; border-radius: var(--radius-xl); box-shadow: var(--shadow-md);">
                    <i class="fa-solid fa-wand-magic-sparkles text-accent" style="font-size: 1.2rem;"></i>
                    <input type="url" id="quick-add-input" placeholder="Paste any URL here and press Enter for fully automatic saving..." style="flex: 1; font-size: 1rem; background: transparent; border: none; outline: none; color: var(--text-primary);" required>
                    <div id="quick-add-spinner" class="hidden text-muted" style="font-size: 0.9rem;"><i class="fa-solid fa-spinner fa-spin"></i> Magic...</div>
                    <button type="submit" class="btn primary-btn" id="quick-add-btn" style="padding: 0.5rem 1.5rem; border-radius: var(--radius-lg);">Auto-Save</button>
                </form>
            </div>

            <!-- Links Grid / List Container -->
            <div class="links-container grid-view" id="links-container">
                <!-- URL cards injected by JS -->
            </div>
        </main>
        
        <!-- Mobile Bottom Quick Add -->
        <div class="mobile-quick-add glass-panel hidden-desktop" id="mobile-quick-add-container">
            <form id="mobile-quick-add-form" class="mobile-quick-add-box">
                <input type="url" id="mobile-quick-add-input" placeholder="Paste URL to auto-save..." required>
                <button type="submit" class="btn primary-btn icon-only-btn" id="mobile-quick-add-btn" title="Auto-Save">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
                <div id="mobile-quick-add-spinner" class="hidden text-muted"><i class="fa-solid fa-spinner fa-spin"></i></div>
            </form>
        </div>
        
        <!-- Mobile Sidebar Overlay -->
        <div class="sidebar-overlay hidden" id="sidebar-overlay"></div>
    </div>

    <!-- Add/Edit Link Modal -->
    <div id="link-modal" class="modal-overlay hidden">
        <div class="modal glass-panel">
            <div class="modal-header">
                <h2 id="modal-title">Add New Link</h2>
                <button class="icon-btn close-modal" id="close-modal-btn">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            
            <form id="link-form" class="modal-body">
                <input type="hidden" id="link-id">
                
                <div class="form-row">
                    <div class="form-group flex-2">
                        <label for="link-url">URL <span class="required">*</span></label>
                        <div class="input-with-icon" style="display: flex; gap: 0.5rem; align-items: stretch; background: transparent;">
                            <div style="position: relative; flex: 1; display: flex; align-items: center;">
                                <i class="fa-solid fa-link input-icon"></i>
                                <input type="url" id="link-url" placeholder="https://example.com/awesome-tool" required style="width: 100%;">
                            </div>
                            <button type="button" class="btn secondary-btn" id="auto-fetch-btn" title="Auto-fill details from URL" style="flex-shrink: 0; padding: 0 1rem;">
                                <i class="fa-solid fa-wand-magic-sparkles"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group flex-2">
                        <label for="link-title">Title <span class="required">*</span></label>
                        <input type="text" id="link-title" placeholder="Give it a descriptive title" required>
                    </div>
                    <div class="form-group flex-1">
                        <label for="link-collection">Collection</label>
                        <div class="input-with-icon">
                            <i class="fa-solid fa-folder input-icon"></i>
                            <input type="text" id="link-collection" placeholder="e.g. Design, Dev..." list="collection-datalist">
                            <datalist id="collection-datalist">
                                <!-- Dynamic collections -->
                            </datalist>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="link-tags">Tags (comma separated)</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-tags input-icon"></i>
                        <input type="text" id="link-tags" placeholder="e.g. UI, tutorial, inspiration">
                    </div>
                </div>

                <div class="form-group">
                    <label for="link-notes">Notes / Description (Optional)</label>
                    <textarea id="link-notes" rows="3" placeholder="Add context to why you saved this link, important things to remember, or key quotes..."></textarea>
                </div>

                <div class="form-group">
                    <label>Cover Image (Optional)</label>
                    <div class="image-upload-container">
                        <div class="image-preview" id="image-preview-container" style="display: none;">
                            <img id="image-preview" src="" alt="Preview">
                            <button type="button" class="icon-btn remove-image-btn" id="remove-image-btn"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                        <div class="image-upload-actions" id="image-upload-actions">
                            <input type="url" id="link-image-url" placeholder="Paste an image URL..." style="flex: 2;">
                            <span style="color: var(--text-muted); font-size: 0.8rem; padding: 0 0.5rem;">OR</span>
                            <button type="button" class="btn secondary-btn" id="trigger-file-input" style="flex: 1;">
                                <i class="fa-solid fa-upload"></i> Upload
                            </button>
                            <input type="file" id="link-image-file" accept="image/*" class="hidden">
                        </div>
                        <input type="hidden" id="link-image-data">
                    </div>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="link-unread" class="custom-checkbox" checked>
                    <label for="link-unread" class="checkbox-label">
                        <i class="fa-solid fa-inbox text-accent"></i> Mark as Read Later (Unread)
                    </label>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="link-favorite" class="custom-checkbox">
                    <label for="link-favorite" class="checkbox-label">
                        <i class="fa-solid fa-star text-warning"></i> Add to Favorites immediately
                    </label>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn secondary-btn close-modal">Cancel</button>
                    <button type="submit" class="btn primary-btn shadow-primary" id="save-link-btn">
                        Save Link
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- QR Code Modal -->
    <div id="qr-modal" class="modal-overlay hidden">
        <div class="modal glass-panel" style="max-width: 350px; text-align: center;">
            <div class="modal-header" style="justify-content: center; position: relative;">
                <h2 style="margin: 0;">Scan to Mobile</h2>
                <button class="icon-btn close-qr-btn" id="close-qr-btn" style="position: absolute; right: 1.5rem; top: 1.5rem;">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="modal-body" style="align-items: center; padding: 2.5rem 2rem;">
                <div style="background: white; padding: 1rem; border-radius: var(--radius-lg); display: inline-block;">
                    <img id="qr-image" src="" alt="QR Code" style="width: 200px; height: 200px; display: block;">
                </div>
                <p id="qr-url-text" style="color: var(--text-muted); font-size: 0.85rem; margin-top: 1rem; word-break: break-all;"></p>
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
