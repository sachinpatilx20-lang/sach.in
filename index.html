<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sach.in - URL Manager</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Sach.in</h1>
            <p>Your minimalist URL manager.</p>
        </header>

        <section class="add-url-section">
            <form id="addUrlForm">
                <input type="url" id="urlInput" placeholder="Paste URL here (e.g., https://example.com)" required>
                <button type="submit" id="addBtn">
                    <span id="btnText">Save Link</span>
                    <span id="btnLoader" class="hidden">Parsing...</span>
                </button>
            </form>
            <p id="errorMessage" class="error-msg hidden"></p>
        </section>

        <section class="sync-section">
            <div class="sync-actions">
                <button id="showExportBtn" class="secondary-btn">Generate Sync Code</button>
                <button id="showImportBtn" class="secondary-btn">Import Sync Code</button>
            </div>
            
            <div id="exportArea" class="sync-area hidden">
                <p>Your 6-Digit Sync PIN:</p>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="text" id="exportCode" readonly style="font-size: 1.5rem; font-weight: bold; letter-spacing: 5px; text-align: center; background: var(--bg-color);">
                    <button id="copyCodeBtn" style="padding: 12px; font-size: 1.2rem;" title="Copy Code">📋</button>
                </div>
                <p style="color: var(--text-secondary); font-size: 0.85rem;">Keep this page open. Enter this PIN on another device to sync.</p>
                <p id="exportStatus" style="font-size: 0.9rem; margin-top: 5px; color: var(--text-secondary);">Waiting for connection...</p>
            </div>

            <div id="importArea" class="sync-area hidden">
                <p>Enter 6-Digit PIN from your other device:</p>
                <input type="text" id="importCodeInput" placeholder="123456" maxlength="6" style="font-size: 1.5rem; font-weight: bold; letter-spacing: 5px; text-align: center; text-transform: uppercase;">
                <button id="importSubmitBtn">Sync Data</button>
                <p id="importStatus" style="font-size: 0.9rem; margin-top: 5px; color: var(--text-secondary);"></p>
                <p id="importError" class="error-msg hidden">Invalid PIN or device offline.</p>
            </div>
        </section>

        <section class="urls-section">
            <div class="controls">
                <h2>Saved Links (<span id="linkCount">0</span>)</h2>
                <button id="clearAllBtn" class="danger-btn">Clear All</button>
            </div>
            <div id="linksGrid" class="links-grid">
                <!-- Links will be dynamically injected here -->
            </div>
        </section>
    </div>

    <!-- P2P Syncing via PeerJS for short 6-digit Codes -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
